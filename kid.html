<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="단어장">
<title>영어 플래시카드</title>
<style>
:root{--bg:#faf9f6;--card:#fff;--border:#e8e5db;--text:#1a1917;--sub:#777;--accent:#2563eb;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
header h1{font-size:16px;font-weight:700}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:70px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none;padding:16px;max-width:500px;margin:0 auto}
.panel.active{display:block}

/* Flashcard */
.card-wrap{perspective:1000px;height:220px;margin:12px 0;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;background:var(--card);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;backface-visibility:hidden}
.card-face.back{transform:rotateY(180deg)}
.card-word{font-size:32px;font-weight:700;letter-spacing:-1px}
.card-meaning{font-size:20px;color:var(--sub)}
.card-hint{font-size:12px;color:#bbb;position:absolute;bottom:14px}
.card-audio{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;margin-top:8px}
.nav-row{display:flex;gap:10px;align-items:center;justify-content:center;margin:8px 0}
.nav-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer}
.progress{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .3s}
.card-counter{font-size:12px;color:var(--sub);text-align:center;margin-bottom:4px}
.mode-toggle{display:flex;gap:8px;margin-bottom:12px}
.mode-btn{flex:1;padding:8px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--sub)}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Spelling */
.spell-prompt{font-size:26px;font-weight:700;text-align:center;margin:20px 0 8px}
.spell-hint{font-size:13px;color:var(--sub);text-align:center;margin-bottom:16px}
.spell-input{width:100%;padding:12px;font-size:18px;text-align:center;letter-spacing:4px;border:2px solid var(--border);border-radius:10px;font-family:monospace;outline:none}
.spell-input:focus{border-color:var(--accent)}
.spell-input.correct{border-color:var(--green);background:#f0fdf4}
.spell-input.wrong{border-color:var(--red);background:#fef2f2;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.spell-feedback{text-align:center;font-size:14px;font-weight:600;min-height:24px;margin:8px 0}
.check-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.next-btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;display:none}

/* Quiz */
.quiz-q{font-size:22px;font-weight:700;text-align:center;margin:16px 0 20px;line-height:1.3}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{padding:14px 10px;background:var(--card);border:2px solid var(--border);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.quiz-opt:active{transform:scale(.97)}
.quiz-opt.correct{background:#f0fdf4;border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:#fef2f2;border-color:var(--red);color:var(--red)}
.quiz-score{font-size:13px;color:var(--sub);text-align:center;margin-bottom:12px}
.quiz-next{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;display:none}

/* Stats */
.stat-row{display:flex;justify-content:space-around;margin:16px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat{text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--sub);margin-top:2px}
</style>
</head>
<body>
<header>
  <span style="font-size:20px">📖</span>
  <h1>영어 플래시카드</h1>
  <span style="margin-left:auto;font-size:12px;color:var(--sub)">7개 단어</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('flash')">📋 카드</button>
  <button class="tab" onclick="showTab('spell')">✏️ 철자</button>
  <button class="tab" onclick="showTab('quiz')">🎯 퀴즈</button>
</div>

<div id="flash" class="panel active"></div>
<div id="spell" class="panel"></div>
<div id="quiz" class="panel"></div>

<script>
const WORDS = [{"en":"Cranked up","ko":"세게 돌려진","isNew":true},{"en":"Hoist","ko":"승강 장치","isNew":true},{"en":"Barge","ko":"바지선","isNew":true},{"en":"Reef","ko":"암초","isNew":true},{"en":"Kept boards from saving sailors","ko":"보트들이 선월 구하지 못하게 했다","isNew":true},{"en":"as well as","ko":"~뿐만 아니라","isNew":true},{"en":"contain","ko":"~을 함유하다, ~이 들어있다","isNew":true}];
let flashIdx = 0, flashMode = 'en-ko';
let spellIdx = 0, spellScore = 0, spellTotal = 0;
let quizIdx = 0, quizScore = 0;
let shuffledFlash, shuffledSpell, shuffledQuiz;

function shuffle(arr) {
  const a = [...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['flash','spell','quiz'][i]===name)
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(name==='flash' && !shuffledFlash) initFlash();
  if(name==='spell' && !shuffledSpell) initSpell();
  if(name==='quiz' && !shuffledQuiz) initQuiz();
}

// ── Flash ──
function initFlash() {
  shuffledFlash = shuffle(WORDS); flashIdx = 0;
  renderFlash();
}

function renderFlash() {
  const w = shuffledFlash[flashIdx];
  const isFront = flashMode === 'en-ko';
  const front = isFront ? w.en : w.ko;
  const back = isFront ? w.ko : w.en;
  document.getElementById('flash').innerHTML = `
    <div class="stat-row">
      <div class="stat"><div class="stat-num">${WORDS.length}</div><div class="stat-label">전체</div></div>
      <div class="stat"><div class="stat-num">${flashIdx+1}</div><div class="stat-label">현재</div></div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn ${flashMode==='en-ko'?'active':''}" onclick="setFlashMode('en-ko')">영→한</button>
      <button class="mode-btn ${flashMode==='ko-en'?'active':''}" onclick="setFlashMode('ko-en')">한→영</button>
    </div>
    <div class="card-counter">${flashIdx+1} / ${shuffledFlash.length}</div>
    <div class="progress"><div class="progress-fill" style="width:${(flashIdx+1)/shuffledFlash.length*100}%"></div></div>
    <div class="card-wrap" onclick="this.querySelector('.card').classList.toggle('flipped')">
      <div class="card">
        <div class="card-face front">
          <div class="card-word">${front}</div>
          <button class="card-audio" onclick="event.stopPropagation();speak('${w.en}')">🔊 발음</button>
          <div class="card-hint">탭해서 뒤집기</div>
        </div>
        <div class="card-face back">
          <div class="card-word" style="font-size:26px">${back}</div>
          <div class="card-hint">탭해서 다시 보기</div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="flashNav(-1)">◀ 이전</button>
      <button class="nav-btn" onclick="initFlash()">🔀 섞기</button>
      <button class="nav-btn" onclick="flashNav(1)">다음 ▶</button>
    </div>
  `;
}

function flashNav(dir) {
  flashIdx = (flashIdx + dir + shuffledFlash.length) % shuffledFlash.length;
  renderFlash();
}

function setFlashMode(mode) {
  flashMode = mode;
  renderFlash();
}

// ── Spell ──
function initSpell() {
  shuffledSpell = shuffle(WORDS); spellIdx = 0; spellScore = 0; spellTotal = 0;
  renderSpell();
}

function renderSpell() {
  const w = shuffledSpell[spellIdx];
  document.getElementById('spell').innerHTML = `
    <div class="stat-row">
      <div class="stat"><div class="stat-num">${spellScore}</div><div class="stat-label">정답</div></div>
      <div class="stat"><div class="stat-num">${spellTotal}</div><div class="stat-label">시도</div></div>
      <div class="stat"><div class="stat-num">${spellIdx+1}/${shuffledSpell.length}</div><div class="stat-label">진행</div></div>
    </div>
    <div class="spell-prompt">${w.ko}</div>
    <div class="spell-hint">위 뜻에 해당하는 영어 단어를 입력하세요</div>
    <input class="spell-input" id="spellInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="영어로 입력..."
      onkeydown="if(event.key==='Enter')checkSpell()">
    <div class="spell-feedback" id="spellFb"></div>
    <button class="check-btn" id="checkBtn" onclick="checkSpell()">확인</button>
    <button class="next-btn" id="nextBtn" onclick="nextSpell()">다음 단어 ▶</button>
  `;
  document.getElementById('spellInput').focus();
}

function checkSpell() {
  const inp = document.getElementById('spellInput');
  const fb = document.getElementById('spellFb');
  const w = shuffledSpell[spellIdx];
  const ans = inp.value.trim().toLowerCase();
  const correct = w.en.toLowerCase();

  spellTotal++;
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'block';

  if(ans === correct) {
    spellScore++;
    inp.classList.add('correct');
    fb.innerHTML = '<span style="color:var(--green)">🎉 정답!</span>';
    speak(w.en);
  } else {
    inp.classList.add('wrong');
    fb.innerHTML = `<span style="color:var(--red)">❌ 정답: ${w.en}</span>`;
  }
}

function nextSpell() {
  spellIdx = (spellIdx + 1) % shuffledSpell.length;
  renderSpell();
}

// ── Quiz ──
function initQuiz() {
  shuffledQuiz = shuffle(WORDS); quizIdx = 0; quizScore = 0;
  renderQuiz();
}

function renderQuiz() {
  const w = shuffledQuiz[quizIdx];
  const others = WORDS.filter(x=>x.en!==w.en);
  const opts = shuffle([w, ...shuffle(others).slice(0,3)]);
  const isEnKo = Math.random() > 0.5;
  const question = isEnKo ? w.en : w.ko;
  const correctAns = isEnKo ? w.ko : w.en;

  document.getElementById('quiz').innerHTML = `
    <div class="quiz-score">점수: ${quizScore} / ${quizIdx} | ${quizIdx+1}/${shuffledQuiz.length}</div>
    <div class="quiz-q">${question}</div>
    <div class="quiz-opts">
      ${opts.map(o => {
        const label = isEnKo ? o.ko : o.en;
        const isCorrect = isEnKo ? o.ko===w.ko : o.en===w.en;
        return `<button class="quiz-opt" onclick="pickQuiz(this,${isCorrect},'${w.en}')">${label}</button>`;
      }).join('')}
    </div>
    <button class="quiz-next" id="quizNext" onclick="nextQuiz()">다음 문제 ▶</button>
  `;
}

function pickQuiz(btn, isCorrect, en) {
  document.querySelectorAll('.quiz-opt').forEach(b=>b.onclick=null);
  if(isCorrect) {
    btn.classList.add('correct');
    quizScore++;
    speak(en);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(b=>{
      if(b.textContent === (document.querySelector('.quiz-q').textContent === en
        ? '' : '')) b.classList.add('correct');
    });
  }
  document.getElementById('quizNext').style.display='block';
  quizIdx++;
}

function nextQuiz() {
  if(quizIdx >= shuffledQuiz.length) {
    document.getElementById('quiz').innerHTML = `
      <div style="text-align:center;padding:40px 16px">
        <div style="font-size:60px;margin-bottom:16px">🏆</div>
        <div style="font-size:24px;font-weight:700;margin-bottom:8px">퀴즈 완료!</div>
        <div style="font-size:18px;color:var(--sub);margin-bottom:24px">${quizScore} / ${shuffledQuiz.length} 정답</div>
        <button onclick="initQuiz()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:16px;font-weight:700;cursor:pointer">다시 하기</button>
      </div>
    `;
  } else {
    renderQuiz();
  }
}

function speak(word) {
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.9;
  speechSynthesis.speak(u);
}

initFlash();
</script>
</body>
</html>
